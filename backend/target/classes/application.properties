# =========================
# Active Profile
# =========================
spring.profiles.active=dev

# =========================
# Application
# =========================
spring.application.name=azurepath-backend
server.port=8080

# =========================
# CORS (used by controllers)
# =========================
cors.allowed-origins=http://localhost:4200,http://localhost:4201
app.cors.allowed-origins=${cors.allowed-origins}

# =========================
# Firebase Realtime Database
# =========================
firebase.database.url=https://azurepath-58ba3-default-rtdb.europe-west1.firebasedatabase.app
firebase.storage.bucket=delta-pharmacy.appspot.com
# If you place your service account JSON in src/main/resources, just the filename is enough
firebase.service-account.path=classpath:firebase-service-account.json


# REPLACE WITH YOUR NEW reCAPTCHA v2 SECRET KEY
recaptcha.secret=${RECAPTCHA_SECRET:6LdKkissAAAAAC_prRifIEiPIMklB2eDO0kpB2Qv}
recaptcha.threshold=0.5



# =========================
# JWT Configuration
# =========================
jwt.secret=REPLACE_WITH_A_STRONG_RANDOM_SECRET
jwt.expiration=86400000

# =========================
# Logging
# =========================
logging.level.com.azurepath=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# =========================
# File Upload
# =========================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# =========================
# Jackson Configuration
# =========================
spring.jackson.serialization.fail-on-empty-beans=false
spring.jackson.default-property-inclusion=non_null

# =========================
# Mail / SMTP (secure)
# =========================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=benothmenrayen50@gmail.com
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
app.mail.from=${APP_MAIL_FROM:${SMTP_USERNAME}}
app.mail.reply-to=${APP_MAIL_REPLY_TO:${APP_MAIL_FROM}}
